<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>ส่งสลิปการชำระเงิน</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: linear-gradient(135deg, #fdf2f8 0%, #fef3c7 100%);
    font-family: -apple-system, 'Segoe UI', 'Sarabun', sans-serif;
    overflow: hidden;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  #loading {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: #db2777;
    font-size: 14px;
    pointer-events: none;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #fce7f3;
    border-top-color: #db2777;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>กำลังโหลด...</div>
</div>

<iframe
  id="app"
  src=""
  allow="camera; microphone; clipboard-write"
  onload="document.getElementById('loading').style.display='none'"
></iframe>

<script>
  // ⚠️ ต้องเปลี่ยน URL ด้านล่างเป็น Apps Script /exec URL ของคุณ
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfy.../exec';

  // ── Parse uid จาก URL ──
  // มาได้ 2 ทาง:
  //   1) ตรงๆ: /upload/?uid=Uxxx (กรณีปุ่มในบิลส่งมาตรง)
  //   2) ผ่าน LIFF: /upload/?liff.state=%3Fuid%3DUxxx... (LIFF เก็บ original query ใน liff.state)
  function extractUid() {
    const params = new URLSearchParams(window.location.search);
    let uid = params.get('uid');
    if (uid) return uid;

    const state = params.get('liff.state');
    if (state) {
      try {
        const cleanState = state.replace(/^\?/, '');
        const sp = new URLSearchParams(cleanState);
        uid = sp.get('uid');
        if (uid) return uid;
      } catch (e) { /* ignore */ }
    }
    return '';
  }

  const uid = extractUid();

  // ── สร้าง URL ของ Apps Script ──
  let queryStr = '?page=upload';
  if (uid) queryStr += '&uid=' + encodeURIComponent(uid);

  document.getElementById('app').src = APPS_SCRIPT_URL + queryStr;
</script>

</body>
</html>
